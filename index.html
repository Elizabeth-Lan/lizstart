<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="content-security-policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' https://elizabeth-lan.github.io/lizstart/; sandbox allow-forms allow-scripts;" />
        <title>Home</title>
        <style>
            @font-face {
                font-family: Rodin;
                src: url(FOT-Rodin\ Pro\ UB.otf);
            }
            body{
                background-image: url(aigis2.jpg);
                background-size: cover;
                background-attachment: fixed;
                background-position: bottom;
                font-family: Rodin;
                overflow: hidden;
            }
            main{
                height: calc(100vh - 12em);
                margin: auto 20vw;
                display: flex;
                align-content: flex-end;
                justify-content: center;
                align-items: flex-end;
                @media only screen and (max-width: 1000px){
                    height: calc(100vh - 6em);
                    margin: auto auto;
                }
            }
            .search-wrapper{
                display: flex;
                justify-content: center;
            }
            input{
                text-align: center;
                width: calc(100% - 5em);
                font-family: Rodin;
                font-size: 1.5em;
                background: rgba(255,255,255,0.4);
                backdrop-filter: blur(40px);
                padding: 0.15em 0.25em;
                border: 0.15em solid #222;
                border-radius: 0.25em;
                box-shadow: 0.15em 0.15em 0 #222;
                &:focus-visible{
                    outline: none;
                }
            }
            nav{
                margin-top: 1em;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: center;
            }
            nav li{
                transition-property: box-shadow, transform;
                transition-duration: 0.15s;
                transition-timing-function: cubic-bezier(.3,.8,.45,1);
                display: inline-block;
                color: #222;
                font-size: 1.5em;
                margin: 0.25em;
                padding: 0 0.25em;
                border: solid #222;
                border-width: 0.15em 0.3em 0.3em 0.15em;
                border-radius: 0.25em;
                background-color: rgba(255,255,255,0.4);
                backdrop-filter: blur(40px);
                box-shadow: 0.15em 0.15em 0 #222;
                &:hover{
                    box-shadow: 0 0 0 #222;
                    transform: translateX(0.15em) translateY(0.15em);
                }
            }
        </style>
    </head>
    <body>
        <main>
            <content>
                <div class="search-wrapper">
                    <input
                    id="search"
                    class="search"
                    type="search"
                    placeholder="Search..."
                    autocomplete="off"
                    autofocus
                    />
                </div>
                <nav class="links">
                    <a href="https://www.youtube.com" target="_parent"><li>Youtube</li></a>
                    <a href="https://www.knockout.chat" target="_parent"><li>Knockout</li></a>
                    <a href="https://www.twitter.com" target="_parent"><li>Twitter</li></a>
                    <a href="https://bsky.app" target="_parent"><li>Bsky</li></a>
                    <a href="https://www.netflix.com" target="_parent"><li>Netflix</li></a>
                    <a href="https://www.mangadex.org" target="_parent"><li>Mangadex</li></a>
                    <a href="https://mail.google.com" target="_parent"><li>Gmail</li></a>
                    <a href="https://docs.google.com" target="_parent"><li>Docs</li></a>
                    <a href="https://sheets.google.com" target="_parent"><li>Sheets</li></a>
                    <a href="https://www.twitch.tv/snapscube" target="_parent"><li>Twitch</li></a>
                    <a href="https://anigo.to" target="_parent"><li>Anime</li></a>
                    <a href="https://app.destinyitemmanager.com" target="_parent"><li>DIM</li></a>
                    <a href="https://www.reddit.com" target="_parent"><li>Reddit</li></a>
                    <a href="https://www.tumblr.com" target="_parent"><li>Tumblr</li></a>
                    <a href="https://www.amazon.co.uk/" target="_parent"><li>Amazon</li></a>
                </nav>
            </content>
        </main>
        <script>
            const searchInput = document.getElementById("search");
            searchInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && searchInput.value.trim()) {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(searchInput.value.trim())}`;
                }
            });
        </script>
    </body>
</html>
